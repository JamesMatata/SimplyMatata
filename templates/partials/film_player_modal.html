<div
    x-data="filmPlayer()"
    @open-film.window="openFilm($event.detail)"
    @keydown.escape.window="if (open) { closeFilm(); $event.stopImmediatePropagation(); }"
>
    <div
        x-ref="stage"
        x-show="open"
        x-cloak
        x-transition:enter="transition-opacity duration-300 ease-out"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition-opacity duration-200 ease-in"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="film-player-modal fixed inset-0 z-[45] overflow-hidden bg-black"
        :class="{ 'is-fullscreen': isFullscreen, 'controls-visible': controlsVisible }"
        x-effect="document.body.classList.toggle('immersive-modal-open', open)"
        role="dialog"
        aria-modal="true"
        :aria-label="title ? ('Watching ' + title) : 'Watching film'"
        @pointerdown="revealControls()"
        @mousemove="revealControls()"
        @touchstart.passive="revealControls()"
    >
        <div class="film-player-stage flex h-[100dvh] max-h-[100dvh] w-full flex-col overflow-hidden">
            <div class="film-player-media relative min-h-0 flex-1 overflow-hidden">
                <video
                    x-ref="video"
                    x-show="src"
                    :src="src"
                    :poster="poster"
                    class="film-player-video absolute inset-0 h-full w-full bg-black object-contain"
                    controls
                    playsinline
                    webkit-playsinline
                    preload="metadata"
                    @play="revealControls()"
                ></video>
                <iframe
                    x-show="youtube"
                    :src="youtube"
                    class="film-player-iframe absolute inset-0 h-full w-full border-0 bg-black"
                    title="Film player"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
                    allowfullscreen
                ></iframe>
            </div>

            <footer
                class="film-player-chrome relative z-20 w-full shrink-0"
                :class="controlsVisible || !isFullscreen ? 'is-shown' : 'is-hidden'"
                @pointerdown.stop="revealControls()"
            >
                <div class="film-player-chrome-inner flex items-center justify-center gap-2 px-3 py-3 sm:gap-3 sm:px-6 sm:py-5">
                    <button
                        type="button"
                        @click="toggleFullscreen()"
                        :aria-label="isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen'"
                        class="film-chrome-btn"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-3.5 w-3.5 shrink-0 sm:h-4 sm:w-4" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M20.25 20.25v-4.5m0 4.5h-4.5m4.5 0L15 15M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9"/>
                        </svg>
                        <span class="sm:hidden" x-text="isFullscreen ? 'Exit' : 'Full'"></span>
                        <span class="hidden sm:inline" x-text="isFullscreen ? 'Exit fullscreen' : 'Fullscreen'"></span>
                    </button>
                    <button
                        type="button"
                        @click="closeFilm()"
                        aria-label="Close player"
                        class="film-chrome-btn"
                    >
                        Close
                    </button>
                </div>
            </footer>
        </div>
    </div>
</div>
