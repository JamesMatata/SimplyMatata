<div
    x-data="filmPlayer()"
    @open-film.window="openFilm($event.detail)"
    @keydown.escape.window="if (open) { closeFilm(); $event.stopImmediatePropagation(); }"
>
    <div
        x-ref="stage"
        x-show="open"
        x-cloak
        x-transition:enter="transition-opacity duration-300 ease-out"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition-opacity duration-200 ease-in"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="film-player-modal fixed z-[45] overflow-hidden bg-black"
        :class="{ 'is-fullscreen': isFullscreen }"
        x-effect="document.body.classList.toggle('immersive-modal-open', open)"
        role="dialog"
        aria-modal="true"
        :aria-label="title ? ('Watching ' + title) : 'Watching film'"
    >
        <div class="film-player-stage relative flex h-full w-full flex-col overflow-hidden">
            <div class="film-player-media relative min-h-0 flex-1 overflow-hidden">
                <video
                    x-ref="video"
                    x-show="src"
                    :src="src"
                    :poster="poster"
                    class="film-player-video absolute inset-0 h-full w-full bg-black object-contain"
                    controls
                    controlslist="nofullscreen nodownload"
                    playsinline
                    webkit-playsinline
                    preload="metadata"
                ></video>
                <iframe
                    x-show="youtube"
                    :src="youtube"
                    class="film-player-iframe absolute inset-0 h-full w-full border-0 bg-black"
                    title="Film player"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                ></iframe>
            </div>

            {# Always-visible chrome: YouTube iframes swallow taps, so auto-hide cannot be recovered #}
            <div class="film-player-chrome is-shown" @pointerdown.stop>
                <button
                    type="button"
                    @click="toggleFullscreen()"
                    :aria-label="isFullscreen ? 'Exit fullscreen' : 'Fullscreen or rotate'"
                    class="film-chrome-btn film-chrome-btn--fs"
                >
                    <svg x-show="!isFullscreen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-5 w-5" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M20.25 20.25v-4.5m0 4.5h-4.5m4.5 0L15 15M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75v4.5m0-4.5h-4.5m4.5 0L15 9"/>
                    </svg>
                    <svg x-show="isFullscreen" x-cloak xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-5 w-5" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25M9 15H4.5M9 15v4.5m0-4.5L3.75 20.25"/>
                    </svg>
                </button>
                <button
                    type="button"
                    @click="closeFilm()"
                    aria-label="Close player"
                    class="film-chrome-btn film-chrome-btn--close"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-5 w-5" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
