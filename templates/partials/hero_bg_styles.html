{% load static %}
<style>
    .hero-mesh,
    .hero-pattern,
    .hero-vignette {
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        transform: translateZ(0);
    }
    .hero-mesh {
        background:
            radial-gradient(ellipse 90% 70% at 15% 45%, rgba(185, 28, 60, 0.14) 0%, transparent 55%),
            radial-gradient(ellipse 85% 75% at 85% 35%, rgba(14, 92, 110, 0.12) 0%, transparent 52%),
            linear-gradient(165deg, #f8f7f5 0%, #eeedeb 45%, #e4e2df 100%);
    }
    .hero-pattern {
        background-image: url("{% static 'images/african-pattern.svg' %}");
        background-repeat: repeat;
        background-size: 80px 80px;
        opacity: 0.04;
        mix-blend-mode: multiply;
    }
    .hero-vignette {
        background:
            radial-gradient(ellipse 130% 105% at 50% 45%, transparent 52%, rgba(0, 0, 0, 0.28) 100%),
            linear-gradient(to bottom, rgba(0, 0, 0, 0.06) 0%, transparent 42%, rgba(0, 0, 0, 0.12) 100%);
    }
    @media (max-width: 639px) {
        .hero-mesh {
            background-color: #eceae7;
            background-image:
                radial-gradient(ellipse 200% 140% at -10% -5%, rgba(185, 28, 60, 0.07) 0%, transparent 52%),
                radial-gradient(ellipse 200% 140% at 110% 105%, rgba(14, 92, 110, 0.05) 0%, transparent 52%);
        }
        .hero-pattern {
            opacity: 0.025;
            mix-blend-mode: normal;
        }
        .hero-vignette {
            background:
                radial-gradient(ellipse 150% 115% at 50% 42%, transparent 58%, rgba(0, 0, 0, 0.18) 100%),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.06) 0%, transparent 34%, rgba(0, 0, 0, 0.06) 100%);
        }
    }
    .hero-scroll-target {
        display: block;
        height: 0;
        width: 100%;
        pointer-events: none;
    }
</style>
