{% load static %}
<header x-data="{ open: false }" @keydown.escape.window="open = false" :class="{ 'nav-is-open': open }" class="fixed top-0 left-0 right-0 z-50">
    <nav class="relative z-50 px-6 py-5 sm:py-6 md:px-10 md:py-8 lg:px-12">
        <div class="flex w-full items-center justify-between">
            <a href="{% url 'index' %}" class="block">
                <img
                    src="{% static 'images/simply-matata-logo.png' %}"
                    alt="Simply Matata"
                    class="nav-logo h-9 w-9 object-contain md:h-10 md:w-10"
                >
            </a>

            <button
                type="button"
                @click="open = !open"
                :aria-expanded="open"
                aria-label="Toggle navigation menu"
                class="relative z-50 flex h-10 w-10 items-center justify-center"
            >
                <span class="relative block h-6 w-8">
                    <span
                        class="nav-line absolute left-0 block h-0.5 w-full bg-white transition-all duration-300 ease-out"
                        :class="open ? 'nav-line-open top-1/2 -translate-y-1/2 rotate-45' : 'top-0'"
                    ></span>
                    <span
                        class="nav-line absolute left-0 top-1/2 block h-0.5 w-full -translate-y-1/2 bg-white transition-all duration-300 ease-out"
                        :class="open ? 'nav-line-open opacity-0 scale-x-0' : 'opacity-100 scale-x-100'"
                    ></span>
                    <span
                        class="nav-line absolute left-0 block h-0.5 w-full bg-white transition-all duration-300 ease-out"
                        :class="open ? 'nav-line-open top-1/2 -translate-y-1/2 -rotate-45' : 'bottom-0'"
                    ></span>
                </span>
            </button>
        </div>
    </nav>

    <div
        x-show="open"
        x-cloak
        x-transition:enter="transition-transform ease-out duration-500"
        x-transition:enter-start="-translate-y-full"
        x-transition:enter-end="translate-y-0"
        x-transition:leave="transition-transform ease-in duration-400"
        x-transition:leave-start="translate-y-0"
        x-transition:leave-end="-translate-y-full"
        class="nav-drawer fixed inset-0 z-40 flex flex-col overflow-y-auto bg-black text-white"
    >
        <div class="nav-drawer-body px-5 sm:px-6 md:px-10 lg:px-14 xl:px-20">
            <ul class="nav-drawer-links">
                <li>
                    <a href="{% url 'index' %}" @click="open = false" class="nav-drawer-link">Home</a>
                </li>
                <li>
                    <a href="{% url 'works' %}" @click="open = false" class="nav-drawer-link">Works</a>
                </li>
                <li>
                    <a href="{% url 'about' %}" @click="open = false" class="nav-drawer-link">About</a>
                </li>
                <li>
                    <a href="{% url 'contact' %}" @click="open = false" class="nav-drawer-link">Contact</a>
                </li>
            </ul>
        </div>

        <div class="nav-drawer-footer px-5 pb-8 sm:px-6 md:px-10 md:pb-10 lg:px-14 xl:px-20">
            <div class="mx-auto max-w-6xl">
                {% include 'partials/social_icons.html' with close_drawer=True %}
            </div>
        </div>
    </div>
</header>
<style>
    /* ── Navigation drawer ── */
    .nav-drawer-body {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 9.5rem;
        padding-bottom: 1.5rem;
    }
    .nav-drawer-links {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.1rem;
        width: 100%;
        max-width: 72rem;
        margin: 0 auto;
    }
    .nav-drawer-link {
        display: block;
        font-weight: 300;
        line-height: 1.02;
        letter-spacing: -0.015em;
        /* Portrait default: scale with width, remain readable */
        font-size: clamp(4.5rem, 19vw, 8rem);
        transition: opacity 0.3s ease;
    }
    .nav-drawer-link:hover {
        opacity: 0.6;
    }
    @media (min-width: 640px) {
        .nav-drawer-body { padding-top: 10rem; }
    }
    @media (min-width: 768px) {
        .nav-drawer-body { padding-top: 11rem; padding-bottom: 2rem; }
    }
    /* Landscape (width > height): two columns.
       Size tracks height (so it never overflows) but stays generous on laptops. */
    @media (orientation: landscape) {
        .nav-drawer-links {
            grid-template-columns: 1fr 1fr;
            column-gap: 3rem;
            row-gap: 0.25rem;
        }
        .nav-drawer-link {
            font-size: clamp(3.5rem, min(18vh, 11vw), 10.5rem);
        }
    }
    /* Short landscape (phones): tighten top padding so links never overflow */
    @media (orientation: landscape) and (max-height: 600px) {
        .nav-drawer-body {
            padding-top: 4.5rem;
            padding-bottom: 1rem;
        }
        .nav-drawer-footer {
            padding-bottom: 1.25rem;
        }
    }
    header.nav-is-open .nav-logo {
        filter: none !important;
    }
    body.home-hero-light header nav .nav-logo {
        filter: invert(1);
        transition: filter 0.3s ease;
    }
    body.home-hero-light header.nav-is-open nav .nav-logo {
        filter: none !important;
    }
    body.home-hero-light header nav .nav-line {
        background-color: #1a1a1a;
        transition: background-color 0.3s ease;
    }
    body.home-hero-light header.nav-is-open nav .nav-line {
        background-color: #ffffff;
    }
    body.home-hero-light header nav .nav-line-open {
        background-color: #ffffff;
    }
</style>
