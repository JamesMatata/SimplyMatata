<div class="works-empty-state {% if full_width %}col-span-full{% endif %} {{ extra_class|default:'' }}">
    <div class="relative flex min-h-[280px] flex-col items-center justify-center rounded-xl border border-dashed border-white/20 bg-white/[0.02] px-8 py-14 text-center sm:min-h-[320px] sm:px-12 sm:py-16 md:min-h-[360px]">
        <span class="pointer-events-none absolute left-5 top-5 h-6 w-6 border-l border-t border-dashed border-white/15"></span>
        <span class="pointer-events-none absolute right-5 top-5 h-6 w-6 border-r border-t border-dashed border-white/15"></span>
        <span class="pointer-events-none absolute bottom-5 left-5 h-6 w-6 border-b border-l border-dashed border-white/15"></span>
        <span class="pointer-events-none absolute bottom-5 right-5 h-6 w-6 border-b border-r border-dashed border-white/15"></span>

        <div class="mb-6 flex h-16 w-16 items-center justify-center rounded-full border border-dashed border-white/20 bg-white/[0.03] text-white/35 sm:h-[4.5rem] sm:w-[4.5rem]">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" class="h-8 w-8 sm:h-9 sm:w-9" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        </div>

        <p class="font-light tracking-tight text-white/75 text-xl sm:text-2xl md:text-[1.65rem]">
            {{ title|default:"Nothing here yet" }}
        </p>
        <p class="mt-3 max-w-md font-light leading-relaxed text-white/40 text-sm sm:text-[0.95rem]">
            {{ subtitle|default:"The archive is quiet for now. New work lands here when it's ready for the world." }}
        </p>

        {% if show_cta %}
        <a
            href="{% url 'contact' %}"
            class="mt-8 inline-flex items-center gap-2 rounded-full border border-dashed border-white/20 px-5 py-2.5 text-[11px] font-light uppercase tracking-[0.22em] text-white/55 transition-colors duration-300 hover:border-[#f5c518] hover:text-[#f5c518]"
        >
            Start a conversation
            <span aria-hidden="true">&rarr;</span>
        </a>
        {% endif %}
    </div>
</div>
