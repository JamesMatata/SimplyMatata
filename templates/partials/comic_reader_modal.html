<div
    x-ref="modal"
    x-show="modalOpen"
    x-cloak
    x-transition:enter="transition-opacity duration-300 ease-out"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-200 ease-in"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="comic-reader-modal fixed inset-0 z-[45] bg-[#070707]"
    x-effect="document.body.classList.toggle('immersive-modal-open', modalOpen)"
    role="dialog"
    aria-modal="true"
    :aria-label="readerLabel ? ('Reading ' + readerLabel) : 'Reading {{ project.title|escapejs }}'"
>
    <p class="sr-only" aria-live="polite">
        Page <span x-text="activePage ? activePage.number : 0"></span>
        <template x-if="pages.length">
            <span> of <span x-text="pages.length"></span></span>
        </template>
    </p>

    <div class="relative flex h-full flex-col pt-[5rem] sm:pt-[5.5rem] md:pt-[6.5rem]">
        <div
            class="relative flex min-h-0 flex-1 items-center justify-center px-14 pb-24 pt-4 sm:px-20 sm:pb-28 sm:pt-6 md:px-28"
            @touchstart.passive="onTouchStart($event)"
            @touchend.passive="onTouchEnd($event)"
        >
            <button
                type="button"
                @click="prevPage()"
                :disabled="currentIndex === 0"
                aria-label="Previous page"
                class="comic-nav-btn comic-nav-btn-prev absolute left-4 top-1/2 z-10 -translate-y-1/2 sm:left-6 md:left-10"
            >
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-5 w-5 sm:h-6 sm:w-6" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
                </svg>
            </button>

            <figure class="relative flex h-full w-full max-w-5xl items-center justify-center">
                <img
                    x-show="activePage"
                    :key="currentIndex"
                    :src="activePage ? activePage.image : ''"
                    :alt="(readerLabel || '{{ project.title|escapejs }}') + ' — page ' + (activePage ? activePage.number : '')"
                    class="max-h-full w-auto max-w-full select-none object-contain shadow-[0_24px_80px_rgba(0,0,0,0.55)]"
                    draggable="false"
                    x-transition:enter="transition-all duration-300 ease-out"
                    x-transition:enter-start="opacity-0 scale-[0.985]"
                    x-transition:enter-end="opacity-100 scale-100"
                >
            </figure>

            <button
                type="button"
                @click="nextPage()"
                :disabled="currentIndex >= pages.length - 1"
                aria-label="Next page"
                class="comic-nav-btn comic-nav-btn-next absolute right-4 top-1/2 z-10 -translate-y-1/2 sm:right-6 md:right-10"
            >
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="h-5 w-5 sm:h-6 sm:w-6" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/>
                </svg>
            </button>
        </div>

        <footer class="pointer-events-none absolute inset-x-0 bottom-0 z-10 flex justify-center px-6 pb-6 sm:pb-8">
            <button
                type="button"
                @click="closeModal()"
                aria-label="Close reader"
                class="comic-close-btn pointer-events-auto"
            >
                Close
            </button>
        </footer>
    </div>
</div>
