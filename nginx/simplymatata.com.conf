server {
    listen 80;
    server_name simplymatata.com www.simplymatata.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name simplymatata.com www.simplymatata.com;

    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/simplymatata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simplymatata.com/privkey.pem;
    include /etc/nginx/conf.d/ssl_params.conf;

    location / {
        proxy_pass http://172.17.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
